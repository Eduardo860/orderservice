server:
  port: 8082

spring:
  application:
    name: orderservice
  data:
    mongodb:
      uri: mongodb://mongo-ordenes:27017/ordenes_db

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: orderservice

logging:
  level:
    '[com.microservices.orderservice]': INFO
    '[org.springframework.data.mongodb]': DEBUG
